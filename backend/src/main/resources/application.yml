server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nestcart
    username: nestcart
    password: nestcart123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

nestcart:
  simulation:
    wind-load-coefficient: 1.2
    air-density: 1.225
    gravity: 9.81
    safety-factor: 1.5
    beam-element-count: 20
  vision:
    earth-radius: 6371000.0
    default-grid-resolution: 10.0
    max-analysis-radius: 5000.0
  alert:
    stress-warning-ratio: 0.8
    stress-critical-ratio: 0.95
    sway-warning-ratio: 0.7
    sway-critical-ratio: 0.9
